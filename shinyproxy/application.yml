proxy:
  title: Stone Living Lab Dashboards
  port: 8080
  container-wait-time: 120000
  hide-navbar: true

  authentication: none

  docker:
    url: unix:///var/run/docker.sock
    internal-networking: true 

  specs:
    - id: SLL_Flood_Dashboard
      display-name: SLL Flood Dashboard
      description: Dashboard for flood conditions
      container-image: sll_shiny_dashboard-shiny-app-1
      container-port: 3838
      container-path: /app  
      container-network: sp-net 
      pull-policy: IfNotPresent
      
      container-volumes:
         - /root/apps/sll_shiny/SLL_Shiny_Dashboard/Data:/srv/shiny-server/Data

    - id: SLL_Current_Coastal_Conditions
      display-name: SLL Current Coastal Conditions
      description: Dashboard of current coastal conditions
      container-image: sll_shiny_dashboard-shiny-app-2
      container-port: 3838
      container-path: /app  
      container-network: sp-net 
      pull-policy: IfNotPresent

      container-volumes:
         - /root/apps/sll_shiny/SLL_Shiny_Dashboard/Data:/srv/shiny-server/Data
